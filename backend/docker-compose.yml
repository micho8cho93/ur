version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.37.0
    container_name: ur-nakama
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ./nakama.yml:/nakama/data/nakama.yml:ro
      - ./modules:/nakama/data/modules:ro
    environment:
      NAKAMA_DATABASE_ADDRESS: "nakama:${POSTGRES_PASSWORD}@postgres:5432/nakama?sslmode=disable"
      NAKAMA_SOCKET_SERVER_KEY: ${NAKAMA_SOCKET_SERVER_KEY}
      NAKAMA_HTTP_KEY: ${NAKAMA_HTTP_KEY}
      NAKAMA_CONSOLE_USERNAME: ${NAKAMA_CONSOLE_USERNAME}
      NAKAMA_CONSOLE_PASSWORD: ${NAKAMA_CONSOLE_PASSWORD}
      NAKAMA_CONSOLE_SIGNING_KEY: ${NAKAMA_CONSOLE_SIGNING_KEY}
      NAKAMA_SESSION_ENCRYPTION_KEY: ${NAKAMA_SESSION_ENCRYPTION_KEY}
      NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY: ${NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY}
    ports:
      - "7350:7350"
      - "7351:7351"
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
          /nakama/nakama migrate up --database.address "$NAKAMA_DATABASE_ADDRESS" &&
          exec /nakama/nakama
          --config /nakama/data/nakama.yml
          --database.address "$NAKAMA_DATABASE_ADDRESS"
          --socket.server_key "$NAKAMA_SOCKET_SERVER_KEY"
          --runtime.http_key "$NAKAMA_HTTP_KEY"
          --console.username "$NAKAMA_CONSOLE_USERNAME"
          --console.password "$NAKAMA_CONSOLE_PASSWORD"
          --console.signing_key "$NAKAMA_CONSOLE_SIGNING_KEY"
          --session.encryption_key "$NAKAMA_SESSION_ENCRYPTION_KEY"
          --session.refresh_encryption_key "$NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY"

volumes:
  postgres_data:
